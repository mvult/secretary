syntax = "proto3";

package secretary.v1;

option go_package = "github.com/mvult/secretary/backend/gen/secretary/v1;secretaryv1";

message Block {
  int64 id = 1;
  string client_key = 2;
  int64 document_id = 3;
  int64 parent_block_id = 4;
  string parent_client_key = 5;
  int32 sort_order = 6;
  string text = 7;
  string todo_status = 8;
  int64 todo_id = 9;
  string created_at = 10;
  string updated_at = 11;
}

message Document {
  int64 id = 1;
  string client_key = 2;
  int64 workspace_id = 3;
  string kind = 4;
  string title = 5;
  string journal_date = 6;
  string created_at = 7;
  string updated_at = 8;
  repeated Block blocks = 9;
  int64 directory_id = 10;
}

message Directory {
  int64 id = 1;
  int64 workspace_id = 2;
  string name = 3;
  int64 parent_id = 4;
  int32 position = 5;
  string created_at = 6;
  string updated_at = 7;
}

message ListDocumentsRequest {
  int64 workspace_id = 1;
}

message ListDocumentsResponse {
  repeated Document documents = 1;
  repeated Directory directories = 2;
}

message GetDocumentRequest {
  int64 id = 1;
}

message GetDocumentResponse {
  Document document = 1;
}

message SaveDocumentRequest {
  Document document = 1;
}

message SaveDocumentResponse {
  Document document = 1;
}

message DeleteDocumentRequest {
  int64 id = 1;
}

message DeleteDocumentResponse {}

message CreateDirectoryRequest {
  int64 workspace_id = 1;
  int64 parent_id = 2;
  string name = 3;
}

message CreateDirectoryResponse {
  Directory directory = 1;
}

message UpdateDirectoryRequest {
  int64 id = 1;
  string name = 2;
  int64 parent_id = 3;
}

message UpdateDirectoryResponse {
  Directory directory = 1;
}

message DeleteDirectoryRequest {
  int64 id = 1;
}

message DeleteDirectoryResponse {}

service DocumentsService {
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse);
  rpc SaveDocument(SaveDocumentRequest) returns (SaveDocumentResponse);
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
  rpc CreateDirectory(CreateDirectoryRequest) returns (CreateDirectoryResponse);
  rpc UpdateDirectory(UpdateDirectoryRequest) returns (UpdateDirectoryResponse);
  rpc DeleteDirectory(DeleteDirectoryRequest) returns (DeleteDirectoryResponse);
}
